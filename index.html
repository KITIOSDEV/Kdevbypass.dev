<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KITDEV BYPASS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:system-ui;
background:radial-gradient(circle at top,#0f172a 0%,#020617 100%);
color:#e5e7eb;
overflow:hidden;
}

.glass{
background:rgba(15,23,42,.65);
border:1px solid rgba(99,102,241,.25);
backdrop-filter:blur(18px);
box-shadow:0 0 25px rgba(79,70,229,.15);
}

.loader{border-top-color:transparent;animation:spin 1s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

#pre{
position:fixed;
inset:0;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:.7s;
}

.bar{
width:220px;
height:2px;
background:#111827;
overflow:hidden;
border-radius:20px;
}

.bar div{
height:100%;
width:0%;
background:linear-gradient(90deg,#6366f1,#a855f7);
border-radius:20px;
transition:width .2s linear;
}

.shimmer{
background:linear-gradient(to right,#818cf8,#c084fc,#818cf8);
background-size:200% auto;
-webkit-background-clip:text;
color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{to{background-position:200% center}}

.active{
background:rgba(99,102,241,.15);
color:#818cf8;
}

input{
background:#020617 !important;
border:1px solid rgba(99,102,241,.4);
color:white;
}

#output{
background:rgba(99,102,241,.08);
border:1px solid rgba(99,102,241,.25);
}

#rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}
</style>
</head>

<body class="min-h-screen flex flex-col items-center p-4">

<div id="pre">
<canvas id="rainLoading"></canvas>

<h1 class="text-3xl font-extrabold tracking-widest mb-6 shimmer">
KITDEV
</h1>

<div class="bar">
<div id="loadBar"></div>
</div>

<p class="mt-4 text-xs opacity-60 tracking-widest">
LOADING SYSTEM...
</p>
</div>

<canvas id="rain"></canvas>

<audio id="bgm" autoplay loop>
<source src="https://files.catbox.moe/uuin90.mp3" type="audio/mpeg">
</audio>

<div id="app" class="opacity-0 transition duration-700 w-full flex flex-col items-center">

<nav class="glass rounded-2xl px-3 py-2 flex gap-2 mt-6">
<button onclick="tab('home')" id="btnHome" class="active px-4 py-2 rounded-xl text-sm font-bold">Trang chủ bypass</button>
<button onclick="tab('support')" id="btnSupport" class="px-4 py-2 rounded-xl text-sm font-bold">Các link được hỗ trợ</button>
<a href="https://discord.gg/kitdev" target="_blank" class="px-4 py-2 rounded-xl text-sm font-bold hover:text-indigo-400">Discord Support</a>
</nav>

<div id="home" class="mt-10 w-full max-w-2xl">
<div class="glass rounded-3xl p-10 text-center">

<h1 class="flex items-center justify-center gap-4 text-5xl font-extrabold uppercase">
<span class="shimmer">KITDEV</span>

<img src="https://i.postimg.cc/g0n6ztrC/IMG-8919.png"
class="w-14 h-14 object-contain"
alt="logo">
</h1>

<p class="text-[10px] opacity-60 uppercase tracking-widest mb-8">
Roblox Client Bypass
</p>

<input id="url"
class="w-full p-5 rounded-2xl outline-none font-semibold text-sm"
placeholder="Dán link cần bypass">

<button onclick="bypass()" class="w-full mt-6 py-5 bg-indigo-600 text-white rounded-2xl font-bold flex justify-center gap-3">
<span id="btnText">BẮT ĐẦU BYPASS</span>
<div id="spin" class="hidden w-5 h-5 border-2 border-white/30 border-t-white loader rounded-full"></div>
</button>

<div id="output" class="hidden mt-6 p-6 rounded-2xl">
<div class="flex justify-between text-xs uppercase mb-4">
<span>Kết quả</span>
<button onclick="copy()">SAO CHÉP</button>
</div>

<div id="result" class="break-all text-indigo-300 font-semibold"></div>
</div>

</div>
</div>

<div id="support" class="hidden mt-10 glass rounded-3xl p-10 max-w-5xl w-full">

<h2 class="text-3xl font-extrabold text-center shimmer mb-10 uppercase">
Bypass Support
</h2>

<div class="grid md:grid-cols-3 gap-8 text-sm">

<div>
<p class="font-bold mb-3">Key System</p>
<p>Hydrogen</p>
<p>Codex</p>
<p>Delta</p>
<p>Trigon</p>
</div>

<div>
<p class="font-bold mb-3">Ad-Link</p>
<p>Linkvertise</p>
<p>Lootlabs</p>
<p>Work.ink</p>
<p>Fly.inc</p>
</div>

<div>
<p class="font-bold mb-3">Paste</p>
<p>Pastebin</p>
<p>Pastefy</p>
<p>Paster.so</p>
</div>

</div>
</div>

<footer class="mt-12 text-[11px] opacity-70 tracking-widest uppercase text-center">
Kitkat_dev bản quyền
</footer>

</div>

<script>

let resultLink="";
let progress=0;

const loadInterval=setInterval(()=>{

progress+=Math.random()*4;

if(progress>=100){
progress=100;
clearInterval(loadInterval);

setTimeout(()=>{
pre.style.opacity="0";
pre.style.visibility="hidden";
document.body.style.overflow="auto";
app.classList.remove("opacity-0");
},600);
}

loadBar.style.width=progress+"%";

},120);

function tab(t){
home.classList.toggle("hidden",t!=="home");
support.classList.toggle("hidden",t!=="support");
btnHome.classList.toggle("active",t==="home");
btnSupport.classList.toggle("active",t==="support");
}

async function bypass(){

let u=url.value.trim();
if(!u)return;

btnText.innerText="ĐANG BYPASS...";
spin.classList.remove("hidden");

try{

let r=await fetch(
"https://api.izen.lol/v1/bypass?url="+encodeURIComponent(u),
{
headers:{
"x-api-key":"30eb2b74-2ebb-4852-ad0f-17a0e6fa35b7"
}
}
);

let d=await r.json();

resultLink=d.result||d.data||d.link||JSON.stringify(d);

result.innerText=resultLink;

output.classList.remove("hidden");

}catch{

result.innerText="BYPASS THẤT BẠI";

output.classList.remove("hidden");

}

btnText.innerText="BẮT ĐẦU BYPASS";
spin.classList.add("hidden");

}

function copy(){
navigator.clipboard.writeText(resultLink);
}

url.addEventListener("keypress",function(e){
if(e.key==="Enter") bypass();
});

const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");

let w,h;

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
}

resize();
window.onresize=resize;

let drops=[];

for(let i=0;i<180;i++){
drops.push({x:Math.random()*w,y:Math.random()*h,l:Math.random()*20+10,s:Math.random()*4+4});
}

function draw(){

ctx.clearRect(0,0,w,h);

ctx.strokeStyle="rgba(148,163,255,0.25)";
ctx.lineWidth=1;

for(let d of drops){

ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d.x,d.y+d.l);
ctx.stroke();

d.y+=d.s;

if(d.y>h){
d.y=-20;
d.x=Math.random()*w;
}

}

requestAnimationFrame(draw);

}

draw();

document.addEventListener("click",()=>{
bgm.play().catch(()=>{});
},{once:true});

</script>

</body>
</html>
